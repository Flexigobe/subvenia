{% if data and data.razon_social %}
<input
  type="text"
  name="razon_social"
  id="razon_social"
  value="{{ data.razon_social }}"
  class="ed-input-box w-full text-lg font-medium border-moss"
  hx-swap-oob="true"
/>
<span class="press-sm text-moss inline-flex items-center gap-2 mt-1">
  <span class="ff-mono">VERIFICADO</span>
  <span>{{ data.razon_social }}{% if data.provincia_text %} · {{ data.provincia_text }}{% endif %}</span>
</span>
{% else %}
<span class="press-sm text-ink3 inline-flex items-center gap-2 mt-1">
  <span class="ff-mono">NO ENCONTRADO</span>
  <span>Rellena los campos manualmente.</span>
</span>
{% endif %}
