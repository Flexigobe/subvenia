{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white border border-gray-200 rounded-2xl p-8 text-center">
  <div class="text-4xl mb-3">✓</div>
  <h1 class="text-2xl font-bold mb-2">Baja confirmada</h1>
  <p class="text-gray-700 mb-1">
    Hemos desactivado las alertas para <strong>{{ email }}</strong>.
  </p>
  <p class="text-sm text-gray-500 mb-6">
    No recibirás más emails con nuevas convocatorias. Si fue un error, vuelve a
    suscribirte desde la página principal.
  </p>
  <a href="/" class="inline-block bg-green-700 hover:bg-green-800 text-white font-semibold px-6 py-2 rounded">
    Volver al inicio →
  </a>
</div>
{% endblock %}
