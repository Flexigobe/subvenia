services:
  - type: web
    name: subvenia-app
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: subvenia-db
          property: connectionString
      - key: PORT
        value: 8000
      - key: LOG_LEVEL
        value: INFO
      - key: BASE_URL
        value: https://subvenia-app.onrender.com
      - key: BDNS_BASE_URL
        value: https://www.infosubvenciones.es/bdnstrans/api
      - key: BDNS_PAGE_SIZE
        value: "100"
      - key: BDNS_SYNC_HOUR
        value: "3"
      - key: BDNS_SYNC_MINUTE
        value: "0"
      - key: MATCHING_CANDIDATE_LIMIT
        value: "30"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ALERT_FROM_EMAIL
        value: alertas@flexigobe.com
      - key: ADMIN_USER
        value: admin
      - key: RATE_LIMIT_PER_HOUR
        value: "60"
      - key: SEO_CANONICAL_ORIGIN
        value: https://subvenia-app.onrender.com
      # Secretos: definir desde el dashboard, no en git
      - key: GEMINI_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: ADMIN_PASS
        sync: false

databases:
  - name: subvenia-db
    plan: basic-256mb
    databaseName: subvenia_db
    user: subvenia_db_user
    region: frankfurt
