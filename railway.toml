# Railway service configuration for subvenciones-app
# https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Alembic se ejecuta en startCommand con timeout corto para no bloquear el healthcheck
# si la DB no está accesible. Si alembic falla, uvicorn arranca igualmente y /healthz
# responde 200 — las rutas que tocan DB fallarán hasta que se solucione el problema.
startCommand = "set +e; echo '[start] env'; env | grep -E '^(DATABASE_URL|PGHOST|RAILWAY_PRIVATE_DOMAIN)' | sed 's/:.*@/:***@/'; echo '[start] alembic'; timeout 60 alembic upgrade head 2>&1; echo '[start] alembic_done'; echo '[start] uvicorn on port:' $PORT; exec python -u -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Single worker by design: APScheduler is in-process and the in-memory rate limiter
# is per-worker. Scaling to multi-worker requires moving the scheduler to a separate
# service and the rate limiter to Redis. See Plan 4 Task 5 / docs.
