<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Buscador de subvenciones{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-5xl mx-auto px-6 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
      <a href="/" class="font-bold text-lg">Buscador de subvenciones</a>
      <nav class="flex flex-wrap items-center gap-4 text-sm">
        <a href="/" class="text-gray-700 hover:text-green-700 hover:underline">Buscar a medida</a>
        <a href="/subvenciones" class="text-gray-700 hover:text-green-700 hover:underline">Todas las subvenciones</a>
        <a href="/noticias" class="text-gray-700 hover:text-green-700 hover:underline">Fuentes y novedades</a>
      </nav>
    </div>
  </header>
  <main class="max-w-5xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
  <footer class="max-w-5xl mx-auto px-6 py-8 text-center text-xs text-gray-500">
    Información orientativa. Consulta siempre la convocatoria oficial.
  </footer>
</body>
</html>
