# Railway service configuration for subvenciones-app
# https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run migrations as preDeployCommand so they don't block the healthcheck window.
# Railway injects $PORT — uvicorn must bind to 0.0.0.0:$PORT.
preDeployCommand = ["sh", "-c", "echo '[predeploy] DB_HOST='${PGHOST:-unset}; echo '[predeploy] testing DNS'; getent hosts ${PGHOST:-postgres.railway.internal} || echo 'DNS FAIL'; echo '[predeploy] alembic upgrade head'; alembic upgrade head"]
startCommand = "echo '[start] uvicorn on port:' $PORT; exec python -u -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Single worker by design: APScheduler is in-process and the in-memory rate limiter
# is per-worker. Scaling to multi-worker requires moving the scheduler to a separate
# service and the rate limiter to Redis. See Plan 4 Task 5 / docs.
