# Railway service configuration for subvenciones-app
# https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run migrations then start the FastAPI server.
# Railway injects $PORT — uvicorn must bind to 0.0.0.0:$PORT.
startCommand = "echo '[start] testing python and DB'; python -u -c \"import os, sys, psycopg; url=os.environ['DATABASE_URL']; print(f'DB URL host: {url.split(\\\"@\\\")[1].split(\\\"/\\\")[0]}', flush=True); conn=psycopg.connect(url.replace('postgresql+psycopg://','postgresql://'), connect_timeout=15); print('DB CONNECTED', flush=True); conn.close()\"; echo '[start] running alembic'; alembic upgrade head; echo '[start] uvicorn on port:' $PORT; exec python -u -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Single worker by design: APScheduler is in-process and the in-memory rate limiter
# is per-worker. Scaling to multi-worker requires moving the scheduler to a separate
# service and the rate limiter to Redis. See Plan 4 Task 5 / docs.
