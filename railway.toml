# Railway service configuration for subvenciones-app
# https://docs.railway.com/reference/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
# Run migrations then start the FastAPI server.
# Railway injects $PORT — uvicorn must bind to 0.0.0.0:$PORT.
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Single worker by design: APScheduler is in-process and the in-memory rate limiter
# is per-worker. Scaling to multi-worker requires moving the scheduler to a separate
# service and the rate limiter to Redis. See Plan 4 Task 5 / docs.
